<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <title>Hoovik — Video meetings that think. In real time.</title>

  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="p1g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="p2g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0F6E56" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="p3g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="p4g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D85A30" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#993C1D" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect width="800" height="220" rx="16" fill="#0a0a0f"/>
  <rect width="800" height="220" rx="16" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="55" x2="800" y2="55" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="110" x2="800" y2="110" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="0" y1="165" x2="800" y2="165" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="220" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="220" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="220" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Floating particles (SMIL) -->
  <circle cx="60" cy="160" r="3" fill="#7F77DD">
    <animate attributeName="cy" values="160;144;160" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="130" r="2" fill="#1D9E75">
    <animate attributeName="cy" values="130;110;130" dur="6s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="155" r="3" fill="#D85A30">
    <animate attributeName="cy" values="155;141;155" dur="4.5s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0.15;0.45" dur="4.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="120" r="2" fill="#0EA5E9">
    <animate attributeName="cy" values="120;100;120" dur="7s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="7s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Logo icon (spinning rings via SMIL animateTransform) -->
  <g transform="translate(370, 8)">
    <!-- Outer dashed ring -->
    <circle cx="30" cy="30" r="28" fill="none" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3" stroke-opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 30 30" to="360 30 30" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner dashed ring -->
    <circle cx="30" cy="30" r="20" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="2 4" stroke-opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="360 30 30" to="0 30 30" dur="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Four quadrant segments -->
    <path d="M30 10 A20 20 0 0 1 50 30 L30 30 Z" fill="#7F77DD" opacity="0.9"/>
    <path d="M50 30 A20 20 0 0 1 30 50 L30 30 Z" fill="#1D9E75" opacity="0.9"/>
    <path d="M30 50 A20 20 0 0 1 10 30 L30 30 Z" fill="#D85A30" opacity="0.9"/>
    <path d="M10 30 A20 20 0 0 1 30 10 L30 30 Z" fill="#0EA5E9" opacity="0.9"/>
    <circle cx="30" cy="30" r="5" fill="#0a0a0f"/>
    <circle cx="30" cy="30" r="2.5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Title "Hoovik" with animated gradient shimmer via SMIL on stop colors -->
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#c4bfff;#ffffff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="45%" stop-color="#7F77DD">
        <animate attributeName="stop-color" values="#7F77DD;#a89ef5;#7F77DD" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" stop-color="#1D9E75">
        <animate attributeName="stop-color" values="#1D9E75;#2dcc97;#1D9E75" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#e0deff;#ffffff" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <text x="400" y="130" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="82" font-weight="800" letter-spacing="-3"
        fill="url(#tg)">Hoovik</text>

  <!-- Subtitle -->
  <text x="400" y="152" text-anchor="middle"
        font-family="Georgia, serif" font-size="14"
        fill="#888888" font-style="italic">
    Video meetings that think. In real time.
  </text>

  <!-- Divider line (animated draw) -->
  <line x1="200" y1="163" x2="600" y2="163" stroke="#333333" stroke-width="0.5"
        stroke-dasharray="400" stroke-dashoffset="400">
    <animate attributeName="stroke-dashoffset" from="400" to="0" dur="1s" begin="0.8s" fill="freeze"/>
  </line>

  <!-- Pill 1: WebRTC P2P -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
    <rect x="75" y="172" width="128" height="26" rx="13" fill="url(#p1g)" stroke="#7F77DD" stroke-width="0.5" stroke-opacity="0.5"/>
    <circle cx="92" cy="185" r="3.5" fill="#7F77DD"/>
    <text x="101" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" font-weight="500" fill="#a89ef5">WebRTC P2P</text>
  </g>

  <!-- Pill 2: Emotion AI -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.65s" fill="freeze"/>
    <rect x="215" y="172" width="118" height="26" rx="13" fill="url(#p2g)" stroke="#1D9E75" stroke-width="0.5" stroke-opacity="0.5"/>
    <circle cx="231" cy="185" r="3.5" fill="#1D9E75"/>
    <text x="240" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" font-weight="500" fill="#2dcc97">Emotion AI</text>
  </g>

  <!-- Pill 3: Whisper ASR -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
    <rect x="345" y="172" width="122" height="26" rx="13" fill="url(#p3g)" stroke="#0EA5E9" stroke-width="0.5" stroke-opacity="0.5"/>
    <circle cx="361" cy="185" r="3.5" fill="#0EA5E9"/>
    <text x="370" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" font-weight="500" fill="#7dd3fc">Whisper ASR</text>
  </g>

  <!-- Pill 4: Groq LLM -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.95s" fill="freeze"/>
    <rect x="479" y="172" width="110" height="26" rx="13" fill="url(#p4g)" stroke="#D85A30" stroke-width="0.5" stroke-opacity="0.5"/>
    <circle cx="495" cy="185" r="4" fill="#D85A30">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="504" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11" font-weight="500" fill="#f4a07a">Groq LLM</text>
  </g>

  <!-- Outer border -->
  <rect width="800" height="220" rx="16" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.06"/>
</svg>
