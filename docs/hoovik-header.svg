<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <title>Hoovik — Video meetings that think. In real time.</title>

  <defs>
    <!-- Premium light background gradient: warm white to cool blue-lavender -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f7ff"/>
      <stop offset="40%" stop-color="#f0effe"/>
      <stop offset="80%" stop-color="#eaf4fb"/>
      <stop offset="100%" stop-color="#f3f8ff"/>
    </linearGradient>

    <!-- Radial glow behind owl -->
    <radialGradient id="owlGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>

    <!-- Title shimmer gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d2060">
        <animate attributeName="stop-color" values="#2d2060;#4a3ab8;#2d2060" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7F77DD">
        <animate attributeName="stop-color" values="#7F77DD;#a89ef5;#7F77DD" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1D9E75">
        <animate attributeName="stop-color" values="#1D9E75;#2dcc97;#1D9E75" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Pill gradients -->
    <linearGradient id="p1g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="p2g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0F6E56" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="p3g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="p4g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D85A30" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#993C1D" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Subtle noise/grain filter for premium feel -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Drop shadow for the card -->
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7F77DD" flood-opacity="0.10"/>
    </filter>

    <!-- Clip for rounded card -->
    <clipPath id="cardClip">
      <rect width="900" height="260" rx="20"/>
    </clipPath>
  </defs>

  <!-- Card background with shadow -->
  <g filter="url(#shadow)">
    <rect width="900" height="260" rx="20" fill="url(#bg)"/>
  </g>

  <!-- Grain overlay for premium texture -->
  <rect width="900" height="260" rx="20" fill="url(#bg)" filter="url(#grain)" opacity="0.035"/>

  <!-- Decorative mesh blobs -->
  <ellipse cx="820" cy="60" rx="130" ry="100" fill="#7F77DD" opacity="0.06"/>
  <ellipse cx="760" cy="200" rx="100" ry="70" fill="#0EA5E9" opacity="0.05"/>
  <ellipse cx="80" cy="200" rx="100" ry="80" fill="#1D9E75" opacity="0.05"/>
  <ellipse cx="130" cy="50" rx="90" ry="70" fill="#7F77DD" opacity="0.05"/>

  <!-- Subtle dot grid pattern (top-right area) -->
  <g opacity="0.08">
    <circle cx="720" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="740" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="760" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="780" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="800" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="820" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="840" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="860" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="880" cy="24" r="1.2" fill="#7F77DD"/>
    <circle cx="720" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="740" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="760" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="780" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="800" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="820" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="840" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="860" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="880" cy="44" r="1.2" fill="#7F77DD"/>
    <circle cx="720" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="740" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="760" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="780" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="800" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="820" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="840" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="860" cy="64" r="1.2" fill="#7F77DD"/>
    <circle cx="880" cy="64" r="1.2" fill="#7F77DD"/>
  </g>

  <!-- Glow circle behind owl -->
  <ellipse cx="95" cy="128" rx="70" ry="70" fill="url(#owlGlow)"/>

  <!-- ======= OWL LOGO embedded, scaled & repositioned ======= -->
  <!-- Original viewBox 680x680, scaled to ~130px tall, placed left -->
  <g transform="translate(28, 63) scale(0.192)">
    <!-- wings -->
    <path d="M240 320 L130 250 L100 340 L120 420 L190 460 L240 420 Z" fill="#4f6ef7"/>
    <path d="M240 320 L145 260 L120 330 L140 400 L195 440 L240 400 Z" fill="#6b84f8"/>
    <line x1="235" y1="325" x2="155" y2="280" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>
    <line x1="235" y1="350" x2="140" y2="330" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>
    <line x1="235" y1="375" x2="148" y2="385" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>
    <line x1="235" y1="400" x2="165" y2="425" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>

    <path d="M440 320 L550 250 L580 340 L560 420 L490 460 L440 420 Z" fill="#3a5af5"/>
    <path d="M440 320 L535 260 L560 330 L540 400 L485 440 L440 400 Z" fill="#4f6ef7"/>
    <line x1="445" y1="325" x2="525" y2="280" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>
    <line x1="445" y1="350" x2="540" y2="330" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>
    <line x1="445" y1="375" x2="532" y2="385" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>
    <line x1="445" y1="400" x2="515" y2="425" stroke="#a0b4ff" stroke-width="1.8" opacity=".7"/>

    <!-- body -->
    <ellipse cx="340" cy="390" rx="120" ry="155" fill="#2d3a8c"/>

    <!-- chest -->
    <ellipse cx="340" cy="420" rx="72" ry="100" fill="#e8eeff"/>
    <ellipse cx="340" cy="395" rx="50" ry="16" fill="#b8c4ff" opacity=".6"/>
    <ellipse cx="340" cy="418" rx="58" ry="16" fill="#b8c4ff" opacity=".5"/>
    <ellipse cx="340" cy="442" rx="63" ry="16" fill="#b8c4ff" opacity=".4"/>
    <ellipse cx="340" cy="468" rx="62" ry="14" fill="#b8c4ff" opacity=".3"/>
    <ellipse cx="340" cy="492" rx="55" ry="12" fill="#b8c4ff" opacity=".2"/>

    <!-- head -->
    <ellipse cx="340" cy="300" rx="110" ry="100" fill="#2d3a8c"/>

    <!-- ear tufts -->
    <polygon points="270,220 248,155 295,200" fill="#7c8fff"/>
    <polygon points="295,200 248,155 305,172" fill="#9aaaf8"/>
    <polygon points="410,220 432,155 385,200" fill="#6b7ef7"/>
    <polygon points="385,200 432,155 375,172" fill="#8899f8"/>

    <!-- face disc -->
    <ellipse cx="340" cy="305" rx="88" ry="80" fill="#3d4fa8"/>

    <!-- eye rings -->
    <polygon points="287,275 275,290 275,310 287,325 313,325 325,310 325,290 313,275" fill="#7c8fff"/>
    <polygon points="367,275 355,290 355,310 367,325 393,325 405,310 405,290 393,275" fill="#9aaaf8"/>

    <!-- eyes -->
    <circle cx="300" cy="300" r="20" fill="#1a2060"/>
    <circle cx="380" cy="300" r="20" fill="#1a2060"/>
    <circle cx="300" cy="300" r="14" fill="#c8d4ff"/>
    <circle cx="380" cy="300" r="14" fill="#c8d4ff"/>
    <circle cx="300" cy="300" r="7" fill="#0a0f3a"/>
    <circle cx="380" cy="300" r="7" fill="#0a0f3a"/>
    <circle cx="304" cy="296" r="3" fill="#fff"/>
    <circle cx="384" cy="296" r="3" fill="#fff"/>

    <!-- beak -->
    <polygon points="330,318 340,345 350,318 340,325" fill="#fbbf24"/>

    <!-- forehead lines -->
    <line x1="300" y1="250" x2="310" y2="270" stroke="#a0b4ff" stroke-width="1.5" opacity=".7"/>
    <line x1="315" y1="245" x2="320" y2="268" stroke="#a0b4ff" stroke-width="1.5" opacity=".6"/>
    <line x1="340" y1="242" x2="340" y2="268" stroke="#a0b4ff" stroke-width="1.5" opacity=".5"/>
    <line x1="365" y1="245" x2="360" y2="268" stroke="#a0b4ff" stroke-width="1.5" opacity=".6"/>
    <line x1="380" y1="250" x2="370" y2="270" stroke="#a0b4ff" stroke-width="1.5" opacity=".7"/>

    <!-- talons -->
    <polygon points="290,520 278,548 292,542 296,560 304,540 308,558 316,538 310,520" fill="#fbbf24"/>
    <polygon points="390,520 378,548 392,542 396,560 404,540 408,558 416,538 410,520" fill="#fbbf24"/>

    <!-- branch -->
    <rect x="220" y="518" width="240" height="12" rx="6" fill="#4f6ef7" opacity=".5"/>

    <!-- accent dot -->
    <circle cx="340" cy="285" r="4" fill="#c8d4ff" opacity=".8"/>
  </g>

  <!-- ======= MAIN TEXT BLOCK ======= -->
  <!-- "Hoovik" wordmark -->
  <text
    x="200" y="122"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="88" font-weight="700"
    letter-spacing="-3"
    fill="url(#titleGrad)"
    opacity="0">
    Hoovik
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text
    x="200" y="148"
    font-family="Georgia, serif"
    font-size="14.5" font-style="italic"
    letter-spacing="0.5"
    fill="#7a789e"
    opacity="0">
    Video meetings that think. In real time.
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Thin rule under tagline -->
  <line x1="200" y1="161" x2="700" y2="161"
        stroke="#c5c0f0" stroke-width="0.7"
        stroke-dasharray="500" stroke-dashoffset="500">
    <animate attributeName="stroke-dashoffset" from="500" to="0" dur="0.9s" begin="0.7s" fill="freeze"/>
  </line>

  <!-- ======= FEATURE PILLS ======= -->
  <!-- Pill 1: WebRTC P2P -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.8s" fill="freeze"/>
    <rect x="200" y="172" width="130" height="28" rx="14"
          fill="url(#p1g)" stroke="#7F77DD" stroke-width="0.8" stroke-opacity="0.45"/>
    <circle cx="218" cy="186" r="4" fill="#7F77DD"/>
    <text x="228" y="191"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11.5" font-weight="600" fill="#4a3ab8">WebRTC P2P</text>
  </g>

  <!-- Pill 2: Emotion AI -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.95s" fill="freeze"/>
    <rect x="342" y="172" width="118" height="28" rx="14"
          fill="url(#p2g)" stroke="#1D9E75" stroke-width="0.8" stroke-opacity="0.45"/>
    <circle cx="360" cy="186" r="4" fill="#1D9E75"/>
    <text x="370" y="191"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11.5" font-weight="600" fill="#0e7a5a">Emotion AI</text>
  </g>

  <!-- Pill 3: Whisper ASR -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.1s" fill="freeze"/>
    <rect x="472" y="172" width="122" height="28" rx="14"
          fill="url(#p3g)" stroke="#0EA5E9" stroke-width="0.8" stroke-opacity="0.45"/>
    <circle cx="490" cy="186" r="4" fill="#0EA5E9"/>
    <text x="500" y="191"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11.5" font-weight="600" fill="#0369a1">Whisper ASR</text>
  </g>

  <!-- Pill 4: Groq LLM -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.25s" fill="freeze"/>
    <rect x="606" y="172" width="104" height="28" rx="14"
          fill="url(#p4g)" stroke="#D85A30" stroke-width="0.8" stroke-opacity="0.45"/>
    <circle cx="623" cy="186" r="4" fill="#D85A30">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="633" y="191"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="11.5" font-weight="600" fill="#b84220">Groq LLM</text>
  </g>

  <!-- Floating accent particles -->
  <circle cx="164" cy="42" r="2.5" fill="#7F77DD" opacity="0.22">
    <animate attributeName="cy" values="42;32;42" dur="5s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.22;0.06;0.22" dur="5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="196" r="2" fill="#1D9E75" opacity="0.20">
    <animate attributeName="cy" values="196;180;196" dur="6.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.20;0.05;0.20" dur="6.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="90" r="3" fill="#D85A30" opacity="0.18">
    <animate attributeName="cy" values="90;76;90" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0.05;0.18" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="220" r="2" fill="#0EA5E9" opacity="0.20">
    <animate attributeName="cy" values="220;206;220" dur="7s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.20;0.06;0.20" dur="7s" begin="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer border (very subtle) -->
  <rect width="900" height="260" rx="20" fill="none"
        stroke="#7F77DD" stroke-width="1" stroke-opacity="0.14"/>
</svg>
