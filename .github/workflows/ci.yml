name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: CI=false npm run build
        env:
          REACT_APP_SIGNALING_URL: http://localhost:8000
          REACT_APP_EMOTION_SOCKET_URL: http://localhost:5002
          REACT_APP_TRANSCRIPT_URL: http://localhost:5001
          REACT_APP_API_URL: http://localhost:8000/api/v1
          REACT_APP_SERVER_URL: http://localhost:8000

  backend:
    name: Backend — syntax check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/app.js

  emotion_service:
    name: Emotion Service — import check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: emotion_service

    steps:
      - uses: actions/checkout@v5

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: emotion_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --ignore E402,F403

      - name: Import check
        run: |
          python - <<'EOF'
          import unittest.mock as mock

          with mock.patch("whisper.load_model", return_value=mock.MagicMock()), \
               mock.patch("transformers.pipeline", return_value=mock.MagicMock()):
              import app

          print("emotion_service app.py imports OK")
          EOF

  transcript_service:
    name: Transcript Service — import check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: transcript_service

    steps:
      - uses: actions/checkout@v5

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: transcript_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --ignore E402,F403

      - name: Import check
        run: |
          python - <<'EOF'
          import unittest.mock as mock

          with mock.patch("whisper.load_model", return_value=mock.MagicMock()), \
               mock.patch("transformers.pipeline", return_value=mock.MagicMock()):
              import app

          print("transcript_service app.py imports OK")
          EOF