name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          REACT_APP_SIGNALING_URL: http://localhost:8000
          REACT_APP_EMOTION_SOCKET_URL: http://localhost:5002
          REACT_APP_TRANSCRIPT_URL: http://localhost:5001
          REACT_APP_API_URL: http://localhost:8000/api/v1
          REACT_APP_SERVER_URL: http://localhost:8000

  backend:
    name: Backend — lint & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Syntax check (entry point)
        run: node --check src/app.js

      - name: Dependency audit
        run: npm audit --audit-level=high

  emotion_service:
    name: Emotion Service — lint & import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: emotion_service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: emotion_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Import check
        run: |
          python - <<'EOF'
          import unittest.mock as mock
          with mock.patch("whisper.load_model", return_value=mock.MagicMock()), \
               mock.patch("transformers.pipeline", return_value=mock.MagicMock()):
              import app
          print("app.py imports OK")
          EOF

  transcript_service:
    name: Transcription Service — lint & import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transcription_service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: transcription_service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Import check
        run: |
          python - <<'EOF'
          import unittest.mock as mock
          with mock.patch("whisper.load_model", return_value=mock.MagicMock()), \
               mock.patch("transformers.pipeline", return_value=mock.MagicMock()):
              import app
          print("app.py imports OK")
          EOF